<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>提词器</title>
<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    overflow: hidden;
}

#container {
    position: absolute;
    width: 60%;
    left: 50%;
    transform: translateX(-50%);
    bottom: -100%;
    font-size: 40px;
    line-height: 1.8;
    text-align: center;
    letter-spacing: 1px;
    will-change: transform;
}

#menu {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
}

select {
    font-size: 18px;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
}

/* 渐隐效果 */
body::before,
body::after {
    content: "";
    position: fixed;
    left: 0;
    width: 100%;
    height: 120px;
    z-index: 10;
    pointer-events: none;
}

body::before {
    top: 0;
    background: linear-gradient(to bottom, black, transparent);
}

body::after {
    bottom: 0;
    background: linear-gradient(to top, black, transparent);
}

/* 中间高亮区域 */
#focus-line {
    position: fixed;
    top: 50%;
    left: 0;
    width: 100%;
    height: 80px;
    margin-top: -40px;
    border-top: 2px solid rgba(255,255,255,0.2);
    border-bottom: 2px solid rgba(255,255,255,0.2);
    pointer-events: none;
}

.sentence {
    display: block;
    opacity: 0.3;
    transform: scale(0.95);
    transition: opacity 0.35s ease, transform 0.35s ease;
}

.sentence.focus {
    opacity: 1;
    transform: scale(1.12);
    color: #ffffff;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
}

.sentence.active {
    opacity: 1;
    transform: scale(1.05);
    font-size: 48px;
    text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.6);
}
.sentence.near {
    opacity: 0.6;
    transform: scale(1.0);
}

@keyframes glowPulse {
    0% { text-shadow: 0 0 6px rgba(255,255,255,0.6); }
    50% { text-shadow: 0 0 18px rgba(255,255,255,1); }
    100% { text-shadow: 0 0 6px rgba(255,255,255,0.6); }
}

.sentence.active {
    animation: glowPulse 2s ease-in-out infinite;
}

button {
    margin-left: 8px;
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
}

button:hover {
    background: rgba(255,255,255,0.3);
}
#speedDisplay {
    margin-left: 8px;
    font-size: 18px;
    vertical-align: middle;
    color: #fff;
}
</style>
</head>
<body>
<div id="menu">
<input type="file" id="fileInput" accept=".md,.txt">

<button onclick="resetScroll()">重置</button>
<button id="pauseBtn" onclick="togglePause()">暂停</button>
<button onclick="prevSentence()">上一句</button>
<button onclick="nextSentence()">下一句</button>
<button onclick="increaseSpeed()">+</button>
<button onclick="decreaseSpeed()">-</button>
<span id="speedDisplay">1.0x</span>
</div>

<div id="container"></div>
<script id="raw-text" type="text/plain"></script>
<div id="focus-line"></div>

<script>
let speed = 0.8;
let container = document.getElementById('container');

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
        loadText(evt.target.result);
    };
    reader.readAsText(file, 'utf-8');
});

// ===== 文本拆句（核心升级） =====
let sentences = [];

function formatSentence(s) {
    // 去掉 ** 标记
    s = s.replace(/\*\*/g, '');

    // 自动断句后，每句不再强制切断，只保留原样
    return s;
}

function loadText(raw) {
    // 统一换行
    raw = raw.replace(/\r\n?/g, '\n').replace(/\*\*/g, '');

    // 先按段落分（保留结构）
    const paragraphs = raw.split('\n');

    sentences = [];

    paragraphs.forEach(line => {
        if (line.trim() === '') {
            // 空行保留
            sentences.push('');
            return;
        }

        // 标题直接保留，不拆
        if (/^\s*#/.test(line)) {
            sentences.push(line);
            return;
        }

        // 🔥 更智能的自动断句
        let parts = line
            .replace(/([，。！？；])/g, '$1|')
            .split('|')
            .map(s => s.trim())
            .filter(Boolean);

        // 二次优化：过长句子再切一刀（更像人说话）
        let refined = [];
        parts.forEach(p => {
            if (p.length > 20) {
                refined.push(...p.split(/(?<=，)/));
            } else {
                refined.push(p);
            }
        });
        parts = refined;

        parts.forEach(p => {
            const t = p.trim();
            if (t) sentences.push(t);
        });
    });

    // 渲染
    container.innerHTML = sentences.map(s => {
        if (s === '') {
            return `<div class="sentence" style="height:40px;"></div>`;
        }
        if (/^\s*#/.test(s)) {
            return `<div class="sentence" style="font-size:56px;font-weight:bold;line-height:1.4;">${s.replace(/^\s*#+\s*/, '')}</div>`;
        }
        return `<div class="sentence">${formatSentence(s)}</div>`;
    }).join('');

    // 重新计算
    sentenceNodes = document.querySelectorAll('.sentence');

    requestAnimationFrame(() => {
        computePositions();
        currentIndex = 0;
        offsetY = 0;
        container.style.transform = `translate3d(-50%, ${offsetY}px, 0)`;
        // 先定位到第一句（不要用 scrollToSentence，避免暂停）
        let first = sentenceNodes[0];
        if (first) {
            let rect = first.getBoundingClientRect();
            let center = window.innerHeight / 2;
            offsetY += center - (rect.top + rect.height / 2);
            container.style.transform = `translate3d(-50%, ${offsetY}px, 0)`;
        }

        // 启动滚动
        paused = false;
        window.currentVelocity = speed;
        lastTime = performance.now();
    });
    // ✅ 关键修复：加载后恢复播放状态
    paused = false;
    window.currentVelocity = speed;
}

let offsetY = 0;
let sentenceNodes = [];

// 🔥 预计算每一句的中心位置（彻底消灭抖动）
let sentencePositions = [];
function computePositions() {
    sentencePositions = [];
    let total = 0;
    sentenceNodes.forEach(node => {
        let h = node.offsetHeight;
        sentencePositions.push(total + h / 2);
        total += h;
    });
}

computePositions();
window.addEventListener('resize', computePositions);

let currentIndex = 0;
let lastIndex = -1;
let pauseTimer = 0;

function updateHighlight() {
    const focusTop = window.innerHeight / 2 - 40;   // 上边线
    const focusBottom = window.innerHeight / 2 + 40; // 下边线

    sentenceNodes.forEach((node, idx) => {
        const rect = node.getBoundingClientRect();
        const center = rect.top + rect.height / 2;

        node.classList.remove('focus');

        // ⭐ 判断是否在两条线之间
        if (Math.abs(center - (window.innerHeight / 2)) < 60) {
            node.classList.add('focus');
            currentIndex = idx; // ✅ 修复当前句索引
        }
    });
}

// 手机滑动控制速度（核心升级）
let startY = 0;
document.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
});

document.addEventListener('touchmove', (e) => {
    let delta = startY - e.touches[0].clientY;
    speed += delta * 0.002;
    speed = Math.max(0.05, Math.min(3, speed));
    startY = e.touches[0].clientY;
});

// 暂停状态
let paused = false;

function togglePause() {
    paused = !paused;
    let btn = document.getElementById('pauseBtn');
    btn.innerText = paused ? '继续' : '暂停';
}

let frameCount = 0;
let lastTime = performance.now();

function scrollText(now) {
    let deltaTime = (now - lastTime) / 16;
    lastTime = now;

    if (!paused) {
        // ✅ 修复：必须每帧都保证 velocity 有值
        if (typeof window.currentVelocity !== 'number' || window.currentVelocity === 0) {
            window.currentVelocity = speed;
        }

        if (pauseTimer > 0) {
            pauseTimer -= 16 * deltaTime;
            window.currentVelocity = 0;
        } else {
            // 平滑逼近速度
            window.currentVelocity += (speed - window.currentVelocity) * 0.08 * deltaTime;
            offsetY -= window.currentVelocity * deltaTime;

            // ⭐ 真正稳定的“最后一句停止”
            const lastNode = sentenceNodes[sentenceNodes.length - 1];
            if (lastNode) {
                const rect = lastNode.getBoundingClientRect();
                const center = window.innerHeight / 2;
                const lastCenter = rect.top + rect.height / 2;

                // 只要最后一句进入中心区域，就直接停
                if (lastCenter <= center) {
                    paused = true;
                    window.currentVelocity = 0;
                    document.getElementById('pauseBtn').innerText = '继续';
                }
            }
        }

        container.style.transform = `translate3d(-50%, ${offsetY}px, 0)`;
    }

    frameCount++;
    updateHighlight(); // ✅ 每帧更新，保证索引准确

    requestAnimationFrame(scrollText);
}

window.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowUp') speed += 0.1;
    if (e.key === 'ArrowDown') speed = Math.max(0.1, speed - 0.1);
});
updateHighlight();

function animateTo(targetOffset, duration = 300) {
    let start = offsetY;
    let startTime = null;

    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        let progress = (timestamp - startTime) / duration;
        progress = Math.min(progress, 1);

        // easeOut
        let ease = 1 - Math.pow(1 - progress, 3);
        offsetY = start + (targetOffset - start) * ease;
        container.style.transform = `translate3d(-50%, ${offsetY}px, 0)`;

        if (progress < 1) {
            requestAnimationFrame(step);
        }
    }

    requestAnimationFrame(step);
}

function scrollToSentence(index) {
    if (index < 0 || index >= sentenceNodes.length) return;

    currentIndex = index;

    // 👉 关键：跳转时先暂停自动滚动（否则会打架）
    paused = true;

    let target = sentenceNodes[index];
    let rect = target.getBoundingClientRect();
    let center = window.innerHeight / 2;
    let delta = center - (rect.top + rect.height / 2);

    let targetOffset = offsetY + delta;

    animateTo(targetOffset, 250);

    // 👉 动画结束后恢复滚动（确保一定恢复）
    setTimeout(() => {
        paused = false;
        window.currentVelocity = speed || 0.8;
        lastTime = performance.now();
    }, 260);
}

function resetScroll() {
    currentIndex = 0;
    offsetY = 0;
    container.style.transform = `translate3d(-50%, ${offsetY}px, 0)`;
    // 居中到第一句
    scrollToSentence(0);
}

function prevSentence() {
    scrollToSentence(currentIndex - 1);
}

function nextSentence() {
    scrollToSentence(currentIndex + 1);
}

function updateSpeedDisplay() {
    document.getElementById('speedDisplay').innerText = speed.toFixed(2) + 'x';
}

function increaseSpeed() {
    speed = Math.min(3, speed + 0.1);
    updateSpeedDisplay();
}

function decreaseSpeed() {
    speed = Math.max(0.1, speed - 0.1);
    updateSpeedDisplay();
}

updateSpeedDisplay();

scrollText();
</script>
</body>
</html>
